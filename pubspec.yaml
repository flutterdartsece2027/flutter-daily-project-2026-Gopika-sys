name: maison_vault_app
description: "A premium luxury asset management and vault application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Design & Core Features
  cupertino_icons: ^1.0.6
  lottie: ^3.1.0
  image_picker: ^1.0.7
  http: ^1.6.0

  # Local Databases & Sessions
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^18.0.1
  google_maps_flutter: ^2.17.1
  location: ^8.0.1
  geolocator: ^14.0.2
  flutter_polyline_points: ^3.1.0
  provider: ^6.1.5+1
  get: ^4.7.3
  redux: ^5.0.0
  flutter_redux: ^0.10.0
  razorpay_flutter: ^1.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Added for GLOWHER icon generation
  flutter_launcher_icons: ^0.13.1

# Configuration for your GLOWHER icon
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/